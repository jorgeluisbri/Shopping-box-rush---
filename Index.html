<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Shopping Box Rush</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <style>
    /* ===== GLOBAL LAYOUT ===== */
    html, body {
      margin: 0;
      padding: 0;
      background: #f5f5f5;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: none; /* Prevent browser gestures interfering with game */
    }

    #game-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      background: linear-gradient(180deg, #001fee 0%, #ff7600 100%);
      overflow: hidden;
    }

    /* ===== TOP BAR (LOGO + LEVEL + SCORE) ===== */
    #top-bar {
      width: 100%;
      max-width: 600px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      box-sizing: border-box;
      color: #ffffff;
    }

    #logo-area {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #logo-box {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: #ff7600;
      border: 2px solid #ffffff;
      box-shadow: 0 0 6px rgba(0,0,0,0.3);
    }

    #logo-text {
      font-weight: 800;
      font-size: 16px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    #info-area {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      font-size: 12px;
    }

    #info-area span {
      line-height: 1.2;
    }

    /* ===== PROGRESS BAR ===== */
    #progress-wrapper {
      width: 100%;
      max-width: 600px;
      padding: 0 12px 8px 12px;
      box-sizing: border-box;
    }

    #progress-label {
      font-size: 12px;
      color: #ffffff;
      margin-bottom: 4px;
    }

    #progress-bar {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.3);
      overflow: hidden;
    }

    #progress-fill {
      width: 0%;
      height: 100%;
      background: #ff7600;
      transition: width 0.25s ease-out;
    }

    /* ===== GAME CANVAS WRAPPER ===== */
    #canvas-wrapper {
      flex: 1;
      width: 100%;
      max-width: 600px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      padding: 4px 8px 8px 8px;
    }

    /* ===== BOTTOM CONTROLS (MOBILE-FRIENDLY) ===== */
    #controls {
      width: 100%;
      max-width: 600px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px 12px 12px;
      box-sizing: border-box;
      gap: 8px;
    }

    .btn {
      flex: 1;
      padding: 10px 6px;
      border-radius: 999px;
      border: none;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #ffffff;
      background: rgba(0,0,0,0.25);
      box-shadow: 0 3px 0 rgba(0,0,0,0.4);
      outline: none;
      touch-action: manipulation;
    }

    .btn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 rgba(0,0,0,0.4);
    }

    #btn-left { background: #001fee; }
    #btn-rotate { background: #ff7600; }
    #btn-right { background: #001fee; }
    #btn-down { background: #ff7600; }
    #btn-restart { background: #222222; flex: 0.8; font-size: 12px; }

    @media (min-width: 768px) {
      #top-bar { padding: 10px 16px; }
      #progress-wrapper { padding: 0 16px 10px 16px; }
      #controls { padding: 10px 16px 16px 16px; }
      .btn { font-size: 15px; }
    }
  </style>
</head>
<body>
  <div id="game-container">
    <!-- TOP BAR -->
    <div id="top-bar">
      <div id="logo-area">
        <div id="logo-box"></div>
        <div id="logo-text">Shopping Box</div>
      </div>
      <div id="info-area">
        <span id="level-label">Level: Easy</span>
        <span id="score-label">Score: 0</span>
      </div>
    </div>

    <!-- PROGRESS BAR -->
    <div id="progress-wrapper">
      <div id="progress-label">Deliveries this level</div>
      <div id="progress-bar">
        <div id="progress-fill"></div>
      </div>
    </div>

    <!-- GAME CANVAS -->
    <div id="canvas-wrapper">
      <div id="phaser-game"></div>
    </div>

    <!-- BOTTOM CONTROLS -->
    <div id="controls">
      <button id="btn-left" class="btn">◀</button>
      <button id="btn-rotate" class="btn">⟳</button>
      <button id="btn-right" class="btn">▶</button>
      <button id="btn-down" class="btn">▼</button>
      <button id="btn-restart" class="btn">Restart</button>
    </div>
  </div>

  <!-- Phaser.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.0/dist/phaser.min.js"></script>

  <script>
    // =========================
    // GAME CONFIG & CONSTANTS
    // =========================

    const GRID_COLS = 10;
    const GRID_ROWS = 20;
    const CELL_SIZE = 24; // base size; Phaser will scale with responsive canvas
    const BOARD_WIDTH = GRID_COLS * CELL_SIZE;
    const BOARD_HEIGHT = GRID_ROWS * CELL_SIZE;

    // Level configuration
    const LEVELS = [
      {
        name: "Easy",
        fallInterval: 800, // ms
        shapes: "basic",
        obstacles: false,
        timed: false,
        deliveriesTarget: 5,
        visualGuides: true
      },
      {
        name: "Basic",
        fallInterval: 600,
        shapes: "basic",
        obstacles: false,
        timed: false,
        deliveriesTarget: 7,
        visualGuides: false
      },
      {
        name: "Intermediate",
        fallInterval: 550,
        shapes: "extended",
        obstacles: false,
        timed: false,
        deliveriesTarget: 9,
        visualGuides: false
      },
      {
        name: "Advanced",
        fallInterval: 450,
        shapes: "extended",
        obstacles: true,
        timed: false,
        deliveriesTarget: 11,
        visualGuides: false
      },
      {
        name: "Expert",
        fallInterval: 400,
        shapes: "extended",
        obstacles: true,
        timed: true,
        timeLimit: 60, // seconds
        deliveriesTarget: 15,
        visualGuides: false
      }
    ];

    // Simple color palette for boxes
    const BOX_COLORS = [0xff7600, 0x001fee, 0x00c853, 0xffd600, 0xff4081];

    // Tetromino-like shapes (1 = filled cell)
    const BASIC_SHAPES = [
      // I
      [
        [1, 1, 1, 1]
      ],
      // O
      [
        [1, 1],
        [1, 1]
      ],
      // L
      [
        [1, 0],
        [1, 0],
        [1, 1]
      ],
      // J
      [
        [0, 1],
        [0, 1],
        [1, 1]
      ],
      // T
      [
        [1, 1, 1],
        [0, 1, 0]
      ]
    ];

    // Extra shapes for higher levels
    const EXTRA_SHAPES = [
      // S
      [
        [0, 1, 1],
        [1, 1, 0]
      ],
      // Z
      [
        [1, 1, 0],
        [0, 1, 1]
      ],
      // Small container
      [
        [1, 1, 1],
        [1, 0, 1]
      ]
    ];

    // =========================
    // MAIN GAME SCENE
    // =========================

    class ShoppingBoxScene extends Phaser.Scene {
      constructor() {
        super("ShoppingBoxScene");
      }

      init() {
        // Grid: 0 = empty, >0 = color index
        this.grid = [];
        for (let r = 0; r < GRID_ROWS; r++) {
          this.grid[r] = new Array(GRID_COLS).fill(0);
        }

        this.currentPiece = null;
        this.currentPiecePos = { x: 3, y: 0 };
        this.currentPieceColor = 0;
        this.fallTimer = 0;
        this.score = 0;
        this.levelIndex = 0;
        this.deliveries = 0;
        this.gameOver = false;
        this.timeRemaining = null;
        this.lastTimeUpdate = 0;

        // Touch/swipe tracking
        this.pointerDown = false;
        this.swipeStartX = 0;
        this.swipeStartY = 0;

        // For simple sound effects
        this.sfxEnabled = true;
      }

      preload() {
        // No external assets; we’ll use graphics and simple generated sounds
      }

      create() {
        // Center board
        const centerX = this.cameras.main.width / 2;
        const centerY = this.cameras.main.height / 2;

        // Scale board to fit screen
        const scaleX = (this.cameras.main.width * 0.9) / BOARD_WIDTH;
        const scaleY = (this.cameras.main.height * 0.8) / BOARD_HEIGHT;
        this.boardScale = Math.min(scaleX, scaleY);

        this.boardOriginX = centerX - (BOARD_WIDTH * this.boardScale) / 2;
        this.boardOriginY = centerY - (BOARD_HEIGHT * this.boardScale) / 2;

        // Graphics for board and pieces
        this.boardGraphics = this.add.graphics();
        this.guideGraphics = this.add.graphics();

        // Level setup
        this.applyLevelSettings();

        // Spawn first piece
        this.spawnNewPiece();

        // Input: keyboard (for desktop)
        this.cursors = this.input.keyboard.createCursorKeys();
        this.input.keyboard.on("keydown-LEFT", () => this.movePiece(-1));
        this.input.keyboard.on("keydown-RIGHT", () => this.movePiece(1));
        this.input.keyboard.on("keydown-DOWN", () => this.softDrop());
        this.input.keyboard.on("keydown-UP", () => this.rotatePiece());

        // Input: touch / pointer for swipe
        this.input.on("pointerdown", (pointer) => {
          this.pointerDown = true;
          this.swipeStartX = pointer.x;
          this.swipeStartY = pointer.y;
        });

        this.input.on("pointerup", (pointer) => {
          if (!this.pointerDown) return;
          this.pointerDown = false;

          const dx = pointer.x - this.swipeStartX;
          const dy = pointer.y - this.swipeStartY;
          const absDx = Math.abs(dx);
          const absDy = Math.abs(dy);

          // Tap (small movement) = rotate
          if (absDx < 10 && absDy < 10) {
            this.rotatePiece();
            return;
          }

          // Horizontal swipe
          if (absDx > absDy) {
            if (dx > 0) this.movePiece(1);
            else this.movePiece(-1);
          } else {
            // Vertical swipe
            if (dy > 0) this.softDrop();
          }
        });

        // Hook up UI buttons
        document.getElementById("btn-left").onclick = () => this.movePiece(-1);
        document.getElementById("btn-right").onclick = () => this.movePiece(1);
        document.getElementById("btn-down").onclick = () => this.softDrop();
        document.getElementById("btn-rotate").onclick = () => this.rotatePiece();
        document.getElementById("btn-restart").onclick = () => this.restartGame();

        // Simple timer text for Expert level
        this.timerText = this.add.text(
          this.cameras.main.width - 10,
          10,
          "",
          {
            fontFamily: "system-ui",
            fontSize: "16px",
            color: "#ffffff"
          }
        ).setOrigin(1, 0).setDepth(10);

        this.updateTopBar();
        this.updateProgressBar();
      }

      applyLevelSettings() {
        const level = LEVELS[this.levelIndex];

        this.fallInterval = level.fallInterval;
        this.shapesMode = level.shapes;
        this.hasObstacles = level.obstacles;
        this.isTimed = level.timed;
        this.deliveriesTarget = level.deliveriesTarget;
        this.visualGuides = level.visualGuides;

        if (this.isTimed) {
          this.timeRemaining = level.timeLimit;
          this.lastTimeUpdate = this.time.now;
        } else {
          this.timeRemaining = null;
        }

        // Add obstacles for Advanced/Expert
        if (this.hasObstacles) {
          this.addRandomObstacles();
        }
      }

      addRandomObstacles() {
        // Add a few random "blocked" cells near the bottom
        for (let i = 0; i < 8; i++) {
          const col = Phaser.Math.Between(0, GRID_COLS - 1);
          const row = Phaser.Math.Between(GRID_ROWS - 6, GRID_ROWS - 2);
          if (this.grid[row][col] === 0) {
            this.grid[row][col] = Phaser.Math.Between(1, BOX_COLORS.length);
          }
        }
      }

      restartGame() {
        this.scene.restart();
      }

      spawnNewPiece() {
        const shapes = [...BASIC_SHAPES];
        if (this.shapesMode === "extended") {
          shapes.push(...EXTRA_SHAPES);
        }

        const shape = Phaser.Utils.Array.GetRandom(shapes);
        this.currentPiece = shape.map(row => [...row]); // clone
        this.currentPieceColor = Phaser.Math.Between(1, BOX_COLORS.length);
        this.currentPiecePos = { x: 3, y: 0 };

        // If spawn position is blocked, game over
        if (!this.isValidPosition(this.currentPiece, this.currentPiecePos.x, this.currentPiecePos.y)) {
          this.triggerGameOver();
        }
      }

      rotateMatrix(matrix) {
        const rows = matrix.length;
        const cols = matrix[0].length;
        const rotated = [];
        for (let c = 0; c < cols; c++) {
          rotated[c] = [];
          for (let r = rows - 1; r >= 0; r--) {
            rotated[c][rows - 1 - r] = matrix[r][c];
          }
        }
        return rotated;
      }

      rotatePiece() {
        if (this.gameOver) return;
        const rotated = this.rotateMatrix(this.currentPiece);
        if (this.isValidPosition(rotated, this.currentPiecePos.x, this.currentPiecePos.y)) {
          this.currentPiece = rotated;
          this.playClickSound();
        }
      }

      movePiece(dir) {
        if (this.gameOver) return;
        const newX = this.currentPiecePos.x + dir;
        if (this.isValidPosition(this.currentPiece, newX, this.currentPiecePos.y)) {
          this.currentPiecePos.x = newX;
          this.playClickSound();
        }
      }

      softDrop() {
        if (this.gameOver) return;
        const newY = this.currentPiecePos.y + 1;
        if (this.isValidPosition(this.currentPiece, this.currentPiecePos.x, newY)) {
          this.currentPiecePos.y = newY;
          this.playClickSound();
        } else {
          // Lock piece
          this.lockPiece();
        }
      }

      isValidPosition(piece, offsetX, offsetY) {
        for (let r = 0; r < piece.length; r++) {
          for (let c = 0; c < piece[r].length; c++) {
            if (!piece[r][c]) continue;
            const x = offsetX + c;
            const y = offsetY + r;
            if (x < 0 || x >= GRID_COLS || y < 0 || y >= GRID_ROWS) {
              return false;
            }
            if (this.grid[y][x] !== 0) {
              return false;
            }
          }
        }
        return true;
      }

      lockPiece() {
        // Merge piece into grid
        for (let r = 0; r < this.currentPiece.length; r++) {
          for (let c = 0; c < this.currentPiece[r].length; c++) {
            if (!this.currentPiece[r][c]) continue;
            const x = this.currentPiecePos.x + c;
            const y = this.currentPiecePos.y + r;
            if (y >= 0 && y < GRID_ROWS && x >= 0 && x < GRID_COLS) {
              this.grid[y][x] = this.currentPieceColor;
            }
          }
        }

        this.playDropSound();
        this.clearCompletedRows();
        this.spawnNewPiece();
      }

      clearCompletedRows() {
        let rowsCleared = 0;
        for (let r = GRID_ROWS - 1; r >= 0; r--) {
          if (this.grid[r].every(cell => cell !== 0)) {
            // Remove row and add empty row at top
            this.grid.splice(r, 1);
            this.grid.unshift(new Array(GRID_COLS).fill(0));
            rowsCleared++;
            r++; // re-check same index after splice
          }
        }

        if (rowsCleared > 0) {
          // Each cleared row = "Delivery Completed!"
          this.deliveries += rowsCleared;
          this.score += rowsCleared * 100;
          this.showDeliveryCompleted(rowsCleared);
          this.updateTopBar();
          this.updateProgressBar();
          this.playDeliverySound();

          // Check level completion
          if (this.deliveries >= this.deliveriesTarget) {
            this.advanceLevel();
          }
        }
      }

      advanceLevel() {
        if (this.levelIndex < LEVELS.length - 1) {
          this.levelIndex++;
          this.showLevelUp();
          this.applyLevelSettings();
          this.updateTopBar();
          this.updateProgressBar(true);
        } else {
          this.showGameWon();
          this.gameOver = true;
        }
      }

      triggerGameOver() {
        this.gameOver = true;
        this.showGameOver();
      }

      // =========================
      // UI & FEEDBACK
      // =========================

      updateTopBar() {
        const levelLabel = document.getElementById("level-label");
        const scoreLabel = document.getElementById("score-label");
        levelLabel.textContent = "Level: " + LEVELS[this.levelIndex].name;
        scoreLabel.textContent = "Score: " + this.score;
      }

      updateProgressBar(reset = false) {
        const fill = document.getElementById("progress-fill");
        const progress = reset ? 0 : Math.min(1, this.deliveries / this.deliveriesTarget);
        fill.style.width = (progress * 100) + "%";
      }

      showDeliveryCompleted(rowsCleared) {
        const text = this.add.text(
          this.cameras.main.width / 2,
          this.cameras.main.height * 0.15,
          rowsCleared === 1 ? "Delivery Completed!" : rowsCleared + " Deliveries Completed!",
          {
            fontFamily: "system-ui",
            fontSize: "24px",
            color: "#ffffff",
            backgroundColor: "#ff7600"
          }
        ).setOrigin(0.5).setDepth(20);

        this.tweens.add({
          targets: text,
          y: text.y - 40,
          alpha: 0,
          duration: 1000,
          ease: "Cubic.easeOut",
          onComplete: () => text.destroy()
        });
      }

      showLevelUp() {
        const text = this.add.text(
          this.cameras.main.width / 2,
          this.cameras.main.height / 2,
          "Level Up!\n" + LEVELS[this.levelIndex].name,
          {
            fontFamily: "system-ui",
            fontSize: "28px",
            color: "#ffffff",
            backgroundColor: "#001fee",
            align: "center"
          }
        ).setOrigin(0.5).setDepth(30);

        this.tweens.add({
          targets: text,
          scale: 1.2,
          yoyo: true,
          repeat: 2,
          duration: 250,
          onComplete: () => {
            this.tweens.add({
              targets: text,
              alpha: 0,
              duration: 600,
              onComplete: () => text.destroy()
            });
          }
        });
      }

      showGameOver() {
        const text = this.add.text(
          this.cameras.main.width / 2,
          this.cameras.main.height / 2,
          "Game Over\nTap Restart",
          {
            fontFamily: "system-ui",
            fontSize: "28px",
            color: "#ffffff",
            backgroundColor: "#ff4081",
            align: "center"
          }
        ).setOrigin(0.5).setDepth(40);
      }

      showGameWon() {
        const text = this.add.text(
          this.cameras.main.width / 2,
          this.cameras.main.height / 2,
          "All Deliveries Completed!\nYou are a Logistics Pro!",
          {
            fontFamily: "system-ui",
            fontSize: "26px",
            color: "#ffffff",
            backgroundColor: "#00c853",
            align: "center"
          }
        ).setOrigin(0.5).setDepth(40);
      }

      // Simple "beep" sounds using Web Audio API
      playTone(freq, duration) {
        if (!this.sfxEnabled) return;
        try {
          const ctx = this.sound.context;
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = "square";
          osc.frequency.value = freq;
          osc.connect(gain);
          gain.connect(ctx.destination);
          gain.gain.setValueAtTime(0.15, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration / 1000);
          osc.start();
          osc.stop(ctx.currentTime + duration / 1000);
        } catch (e) {
          // Ignore if audio context not ready
        }
      }

      playClickSound() {
        this.playTone(600, 80);
      }

      playDropSound() {
        this.playTone(300, 120);
      }

      playDeliverySound() {
        this.playTone(800, 150);
      }

      // =========================
      // MAIN UPDATE LOOP
      // =========================

      update(time, delta) {
        if (this.gameOver) return;

        // Timed level countdown
        if (this.isTimed && this.timeRemaining !== null) {
          const elapsed = (time - this.lastTimeUpdate) / 1000;
          if (elapsed >= 1) {
            this.timeRemaining -= Math.floor(elapsed);
            this.lastTimeUpdate = time;
            if (this.timeRemaining <= 0) {
              this.timeRemaining = 0;
              this.triggerGameOver();
            }
          }
          this.timerText.setText("Time: " + this.timeRemaining + "s");
        } else {
          this.timerText.setText("");
        }

        // Auto fall
        this.fallTimer += delta;
        if (this.fallTimer >= this.fallInterval) {
          this.fallTimer = 0;
          const newY = this.currentPiecePos.y + 1;
          if (this.isValidPosition(this.currentPiece, this.currentPiecePos.x, newY)) {
            this.currentPiecePos.y = newY;
          } else {
            this.lockPiece();
          }
        }

        // Draw board
        this.drawBoard();
      }

      drawBoard() {
        this.boardGraphics.clear();
        this.guideGraphics.clear();

        // Background board
        this.boardGraphics.fillStyle(0x000000, 0.25);
        this.boardGraphics.fillRoundedRect(
          this.boardOriginX - 4,
          this.boardOriginY - 4,
          BOARD_WIDTH * this.boardScale + 8,
          BOARD_HEIGHT * this.boardScale + 8,
          12
        );

        // Visual guides (Easy level)
        if (this.visualGuides) {
          this.guideGraphics.lineStyle(1, 0xffffff, 0.1);
          for (let r = 0; r <= GRID_ROWS; r++) {
            const y = this.boardOriginY + r * CELL_SIZE * this.boardScale;
            this.guideGraphics.lineBetween(
              this.boardOriginX,
              y,
              this.boardOriginX + BOARD_WIDTH * this.boardScale,
              y
            );
          }
          for (let c = 0; c <= GRID_COLS; c++) {
            const x = this.boardOriginX + c * CELL_SIZE * this.boardScale;
            this.guideGraphics.lineBetween(
              x,
              this.boardOriginY,
              x,
              this.boardOriginY + BOARD_HEIGHT * this.boardScale
            );
          }
        }

        // Draw placed boxes
        for (let r = 0; r < GRID_ROWS; r++) {
          for (let c = 0; c < GRID_COLS; c++) {
            const cell = this.grid[r][c];
            if (cell !== 0) {
              const color = BOX_COLORS[cell - 1];
              this.drawBox(c, r, color);
            }
          }
        }

        // Draw current falling piece
        if (this.currentPiece) {
          for (let r = 0; r < this.currentPiece.length; r++) {
            for (let c = 0; c < this.currentPiece[r].length; c++) {
              if (!this.currentPiece[r][c]) continue;
              const x = this.currentPiecePos.x + c;
              const y = this.currentPiecePos.y + r;
              if (y >= 0) {
                const color = BOX_COLORS[this.currentPieceColor - 1];
                this.drawBox(x, y, color, true);
              }
            }
          }
        }
      }

      drawBox(gridX, gridY, color, isFalling = false) {
        const x = this.boardOriginX + gridX * CELL_SIZE * this.boardScale;
        const y = this.boardOriginY + gridY * CELL_SIZE * this.boardScale;
        const size = CELL_SIZE * this.boardScale;

        // Base box
        this.boardGraphics.fillStyle(color, 1);
        this.boardGraphics.fillRoundedRect(x + 1, y + 1, size - 2, size - 2, 4);

        // Border
        this.boardGraphics.lineStyle(2, 0xffffff, 0.7);
        this.boardGraphics.strokeRoundedRect(x + 1, y + 1, size - 2, size - 2, 4);

        // "Shipping label" detail
        this.boardGraphics.fillStyle(0xffffff, 0.8);
        this.boardGraphics.fillRect(x + size * 0.15, y + size * 0.2, size * 0.4, size * 0.12);

        // "Arrows" detail
        this.boardGraphics.fillStyle(0xffffff, 0.9);
        this.boardGraphics.fillTriangle(
          x + size * 0.65, y + size * 0.7,
          x + size * 0.8, y + size * 0.7,
          x + size * 0.725, y + size * 0.5
        );
        this.boardGraphics.fillTriangle(
          x + size * 0.85, y + size * 0.7,
          x + size * 1.0, y + size * 0.7,
          x + size * 0.925, y + size * 0.5
        );

        // Slight transparency for falling piece
        if (isFalling) {
          this.boardGraphics.fillStyle(0xffffff, 0.15);
          this.boardGraphics.fillRoundedRect(x + 1, y + 1, size - 2, size - 2, 4);
        }
      }
    }

    // =========================
    // PHASER GAME CONFIG
    // =========================

    const config = {
      type: Phaser.AUTO,
      parent: "phaser-game",
      backgroundColor: "rgba(0,0,0,0)",
      scale: {
        mode: Phaser.Scale.RESIZE,
        autoCenter: Phaser.Scale.CENTER_BOTH
      },
      physics: {
        default: "arcade",
        arcade: { debug: false }
      },
      scene: [ShoppingBoxScene]
    };

    const game = new Phaser.Game(config);
  </script>
